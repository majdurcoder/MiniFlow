name: Build MiniFlow DMG

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 

      - name: Build Backend
        run: |
          cd miniflow-engine
          python3 -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt pyinstaller
          cd ..
          SKIP_BACKEND=0 ./build_backend.sh

      - name: Build Swift App and DMG
        run: |
          chmod +x build_all.sh build_backend.sh build_dmg.sh
          # We skip the backend here because we built it in the previous step
          SKIP_BACKEND=1 ./build_all.sh

      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiniFlow-DMG
          path: build/*.dmg
